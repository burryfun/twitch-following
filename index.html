<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="icon" type="image/png" href="favicon.png"/>
  <title>Twitch Channel Following</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(12px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    .animate-fadeInUp {
      animation: fadeInUp 0.4s ease-out forwards;
    }
  </style>
</head>
<body class="bg-black text-white font-sans h-screen flex flex-col">

  <div class="p-4 flex justify-end gap-2">
    <button id="lang-ru" class="px-3 py-1 rounded bg-gray-800 hover:bg-gray-700">RU</button>
    <button id="lang-en" class="px-3 py-1 rounded bg-gray-800 hover:bg-gray-700">EN</button>
  </div>

  <!-- Ввод логина и сортировка -->
  <div class="px-4 space-y-3">
    <h1 id="title" class="text-2xl sm:text-3xl text-center">Заголовок</h1>
    

    <div class="mx-auto px-4 space-y-6">
      <div class="flex justify-center">
        <input
          id="username"
          type="text"
          placeholder=""
          class="w-full max-w-[25rem] p-3 rounded bg-gray-800 text-white focus:outline-none focus:ring-2 focus:ring-purple-500 text-xl text-center"
        />
      </div>
      <!-- Кнопки сортировки -->
      <div class="flex gap-4 justify-center">
          <button id="sortDesc" class="flex-1 max-w-[12rem] bg-purple-600 px-6 py-3 text-lg rounded hover:bg-purple-500">
            Newest First
          </button>
          <button id="sortAsc" class="flex-1 max-w-[12rem] bg-gray-700 px-6 py-3 text-lg rounded hover:bg-gray-600">
            Oldest First
          </button>
      </div>

      <!-- Карточки -->
      <div class="text-center p-4" id="loading" hidden>Загрузка...</div>
      <div id="cardsContainer" class="flex flex-wrap gap-4 justify-center "></div>
    </div>
  </div>

  <script>
    const i18n = {
      ru: {
        title: "Подписки Twitch-пользователя",
        placeholder: "Введите логин",
        sortDesc: "Сначала новые",
        sortAsc: "Сначала старые",
        loading: "Загрузка...",
        noData: "Каналы не найдены.",
        error: "Ошибка загрузки данных.",
      },
      en: {
        title: "Twitch User's Following",
        placeholder: "Enter username    ",
        sortDesc: "Newest First",
        sortAsc: "Oldest First",
        loading: "Loading...",
        noData: "No channels found.",
        error: "Failed to load data.",
      }
    };

    const GQL_QUERY = `query ChannelFollows($login: String!, $limit: Int, $sort: SortOrder, $cursor: Cursor) { user(login: $login) { follows(first: $limit, order: $sort, after: $cursor) { edges { node { displayName login profileImageURL(width: 150) stream { type } } followedAt } pageInfo { hasNextPage endCursor } totalCount } } }`;

    let lang = localStorage.getItem("lang") || (navigator.language.startsWith("ru") ? "ru" : "en");
    const $ = id => document.getElementById(id);

    function updateLanguage() {
      const t = i18n[lang];
      document.title = t.title;
      $("title").textContent = t.title;
      $("username").placeholder = t.placeholder;
      $("sortDesc").textContent = t.sortDesc;
      $("sortAsc").textContent = t.sortAsc;
      if (!cardsContainer.children.length) $("loading").textContent = t.loading;

      const activeClass = "bg-purple-600 text-white";
      const inactiveClass = "bg-gray-800 hover:bg-gray-700 text-white";

      $("lang-ru").className = lang === "ru" ? activeClass + " px-3 py-1 rounded" : inactiveClass + " px-3 py-1 rounded";
      $("lang-en").className = lang === "en" ? activeClass + " px-3 py-1 rounded" : inactiveClass + " px-3 py-1 rounded";
    }

    $("lang-ru").addEventListener("click", () => {
      lang = "ru";
      localStorage.setItem("lang", lang);
      updateLanguage();
    });
    $("lang-en").addEventListener("click", () => {
      lang = "en";
      localStorage.setItem("lang", lang);
      updateLanguage();
    });

    const input = $("username");
    const cardsContainer = $("cardsContainer");
    const loading = $("loading");
    const btnDesc = $("sortDesc");
    const btnAsc = $("sortAsc");
    
    updateLanguage();

    let currentOrder  = 'DESC';
    let cursor        = null;
    let loadingState  = false;
    let hasMore       = false;
    let loadedCount   = 0;

    const fetchFollows = async (login, reset = false) => {
      if (reset) {
        scrollObserver?.disconnect();
        cursor      = null;
        loadedCount = 0;
        hasMore     = true;
        cardsContainer.innerHTML = '';
      } else if (loadingState) {
        return;
      }

      loadingState = true;
      if (loadedCount === 0) {
        loading.hidden = false;
        loading.textContent = i18n[lang].loading;
      }

      try {
        const res = await fetch('https://gql.twitch.tv/gql', {
          method: 'POST',
          headers: {
            'Client-Id': 'ue6666qo983tsx6so1t0vnawi233wa',
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ query: GQL_QUERY, variables: { login, limit: 100, cursor, sort: currentOrder } })
        });

        const json     = await res.json();
        const follows  = json?.data?.user?.follows;
        const edges    = follows?.edges;
        const pageInfo = follows?.pageInfo;

        if (!edges?.length) {
          hasMore = false;
          if (loadedCount === 0) {
            loading.hidden = false;
            loading.textContent = i18n[lang].noData;
          } else {
            loading.hidden = true;
          }
          return;
        }

        for (let i = 0; i < edges.length; i++) {
          const { node } = edges[i];
          const existing = cardsContainer.children[loadedCount + i];
          const card     = existing ?? document.createElement('a');
          fillCard(card, node);
          if (!existing) cardsContainer.appendChild(card);
        }

        loadedCount += edges.length;
        cursor  = pageInfo?.endCursor ?? null;
        hasMore = pageInfo?.hasNextPage ?? false;

        const total  = follows.totalCount ?? loadedCount;
        const needed = total - cardsContainer.children.length;
        if (needed > 0) {
          const frag = document.createDocumentFragment();
          for (let i = 0; i < needed; i++) frag.appendChild(makePlaceholder());
          cardsContainer.appendChild(frag);
        }

        loading.hidden = true;

      } catch (err) {
        console.error("Ошибка загрузки:", err);
        loading.hidden = false;
        loading.textContent = i18n[lang].error;
      } finally {
        loadingState = false;
        if (hasMore) {
          observeLoadBoundary(login);
        } else {
          scrollObserver?.disconnect();
          while (cardsContainer.children.length > loadedCount) {
            cardsContainer.removeChild(cardsContainer.lastChild);
          }
        }
      }
    };

    function fillCard(card, user) {
      card.href = `https://twitch.tv/${user.login}`;
      card.target = '_blank';
      card.className = `
        card group flex flex-col items-center w-80 p-6 bg-gray-800 rounded-xl hover:bg-gray-700
        transition-transform duration-100 ease-out hover:shadow-2xl
        will-change-transform
      `.trim();

      card.innerHTML = `
        <img src="${user.profileImageURL}" alt="${user.login}" class="w-24 h-24 rounded-full mb-3 object-cover border border-gray-600">
        <div class="text-base font-medium text-center truncate">${user.login}</div>
      `;

      handleCardTilt(card);
    }

    function makePlaceholder() {
      const p = document.createElement('a');
      p.href = '#';
      p.className = 'flex flex-col items-center w-80 rounded-xl bg-gray-800 opacity-30';
      p.style.minHeight = '10rem';
      return p;
    }

    let scrollObserver = null;
    let scrollRaf = false;

    function hasVisiblePlaceholder() {
      const boundary = cardsContainer.children[loadedCount];
      if (!boundary) return false;
      return boundary.getBoundingClientRect().top < window.innerHeight + 200;
    }

    function observeLoadBoundary(login) {
      scrollObserver?.disconnect();
      const boundary = cardsContainer.children[loadedCount];
      if (!boundary) return;

      if (hasVisiblePlaceholder()) { fetchFollows(login); return; }

      scrollObserver = new IntersectionObserver(([entry]) => {
        if (entry.isIntersecting) fetchFollows(login);
      }, { rootMargin: '200px' });
      scrollObserver.observe(boundary);
    }

    window.addEventListener('scroll', () => {
      if (scrollRaf || !hasMore) return;
      scrollRaf = true;
      requestAnimationFrame(() => {
        scrollRaf = false;
        const login = input.value.trim();
        if (login && !loadingState && hasVisiblePlaceholder()) fetchFollows(login);
      });
    }, { passive: true });

    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        const login = input.value.trim();
        if (login) fetchFollows(login, true);
      }
    });

    btnDesc.addEventListener('click', () => {
      currentOrder = 'DESC';
      const login = input.value.trim();
      if (login) fetchFollows(login, true);
    });

    btnAsc.addEventListener('click', () => {
      currentOrder = 'ASC';
      const login = input.value.trim();
      if (login) fetchFollows(login, true);
    });

    function handleCardTilt(card) {
      let requestId = null;

      function updateTransform(x, y, rect) {
        const centerX = rect.width / 2;
        const centerY = rect.height / 2;

        const rotateX = -(y - centerY) / 8;
        const rotateY = (x - centerX) / 8;

        card.style.transform = `
          perspective(800px)
          rotateX(${rotateX}deg)
          rotateY(${rotateY}deg)
          scale(1.06)
        `;
      }

      function onMouseMove(e) {
        const rect = card.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;

        if (requestId) cancelAnimationFrame(requestId);
        requestId = requestAnimationFrame(() => updateTransform(x, y, rect));
      }

      function onMouseLeave() {
        card.style.transition = "transform 0.3s ease";
        card.style.transform = "perspective(800px) rotateX(0deg) rotateY(0deg) scale(1)";
        requestId = null;
      }

      function onMouseEnter() {
        card.style.transition = "transform 0.1s ease";
      }

      card.addEventListener("mousemove", onMouseMove);
      card.addEventListener("mouseleave", onMouseLeave);
      card.addEventListener("mouseenter", onMouseEnter);
    }
  </script>
</body>
</html>
